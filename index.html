<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>33 位人物思维顾问 &middot; 女娲蒸馏目录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* ====== 墨水经典 (归藏 Style A) ====== */
  --ink: #0a0a0b;
  --ink-rgb: 10,10,11;
  --paper: #f1efea;
  --paper-rgb: 241,239,234;
  --paper-tint: #e8e5de;
  --ink-tint: #18181a;

  /* ====== 五色 accent（朱砂/石青/石绿/花青/赭石）====== */
  --cinnabar: #c04040;
  --cinnabar-bg: rgba(192,64,64,0.08);
  --azure: #5088b0;
  --azure-bg: rgba(80,136,176,0.08);
  --malachite: #509070;
  --malachite-bg: rgba(80,144,112,0.08);
  --indigo: #6058a8;
  --indigo-bg: rgba(96,88,168,0.08);
  --ochre: #b89850;
  --ochre-bg: rgba(184,152,80,0.08);

  /* ====== 字体 ====== */
  --mono: "IBM Plex Mono", ui-monospace, monospace;
  --serif-en: "Playfair Display", Georgia, serif;
  --serif-zh: "Noto Serif SC", source-han-serif-sc, serif;
  --sans-zh: "Noto Sans SC", source-han-sans-sc, sans-serif;
  --font-serif: "Playfair Display", "Noto Serif SC", serif;
  --font-sans: "Noto Sans SC", sans-serif;
  --font-mono: "IBM Plex Mono", monospace;

  --col-width: 1200px;
  --reader-width: 720px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 17px; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans-zh);
  font-weight: 300;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ═══════════════ HERO ═══════════════ */
.hero {
  padding: 7rem 2rem 5rem;
  text-align: center;
  max-width: 800px;
  margin: 0 auto;
}
.hero .eyebrow {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--cinnabar);
  opacity: 0.7;
  margin-bottom: 2rem;
}
.hero h1 {
  font-family: var(--serif-en);
  font-size: clamp(3.2rem, 6.5vw, 5rem);
  font-weight: 700;
  line-height: 1.04;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 1rem;
}
.hero h1 em {
  font-family: var(--serif-zh);
  font-style: normal;
  font-weight: 900;
  color: var(--cinnabar);
}
.hero .deck {
  font-family: var(--serif-zh);
  font-size: 1.05rem;
  color: rgba(var(--ink-rgb), 0.6);
  font-weight: 400;
  max-width: 540px;
  margin: 0 auto 1.2rem;
  line-height: 1.7;
}
.hero .rule {
  width: 60px; height: 1px;
  background: rgba(var(--ink-rgb), 0.18);
  margin: 2rem auto;
}
.hero .count {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: rgba(var(--ink-rgb), 0.45);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ═══════════════ CAT NAV ═══════════════ */
.cat-nav-wrap {
  position: sticky; top: 0; z-index: 20;
  background: rgba(var(--paper-rgb), 0.92);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(var(--ink-rgb), 0.08);
  padding: 0 2rem;
}
.cat-nav {
  max-width: var(--col-width); margin: 0 auto;
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 0.35rem; padding: 1rem 0;
}
.cat-nav button {
  font-family: var(--mono);
  font-size: 0.68rem; font-weight: 400;
  padding: 0.4rem 1rem;
  border: 1px solid rgba(var(--ink-rgb), 0.15);
  background: transparent; color: rgba(var(--ink-rgb), 0.6);
  cursor: pointer; border-radius: 20px;
  transition: all 0.2s; letter-spacing: 0.06em;
}
.cat-nav button:hover { background: var(--paper-tint); color: var(--ink); border-color: rgba(var(--ink-rgb), 0.3); }
.cat-nav button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ═══════════════ MAIN ═══════════════ */
main { max-width: var(--col-width); margin: 0 auto; padding: 2.5rem 2rem 5rem; }

/* ── Category Section Header ── */
.cat-section { margin-bottom: 5rem; }
.cat-head {
  display: flex; align-items: baseline; gap: 1rem;
  margin-bottom: 0.3rem; padding-bottom: 0.7rem;
  border-bottom: 1px solid rgba(var(--ink-rgb), 0.1);
}
.cat-head h2 {
  font-family: var(--serif-zh);
  font-size: 2rem; font-weight: 600;
  color: var(--ink); letter-spacing: 0.01em;
}
.cat-head .cat-count {
  font-family: var(--mono);
  font-size: 0.72rem; color: rgba(var(--ink-rgb), 0.45);
  letter-spacing: 0.08em;
}

/* ── Cards Grid ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1rem; }
.card {
  background: #fff; cursor: pointer;
  transition: all 0.3s; position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  border-radius: var(--radius-md);
  border: 1px solid rgba(var(--ink-rgb), 0.06);
}
.card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.06); border-color: rgba(var(--ink-rgb), 0.14); }
.card .card-bar { height: 3px; flex-shrink: 0; }
.card:nth-child(5n+1) .card-bar { background: var(--cinnabar); }
.card:nth-child(5n+2) .card-bar { background: var(--azure); }
.card:nth-child(5n+3) .card-bar { background: var(--malachite); }
.card:nth-child(5n+4) .card-bar { background: var(--indigo); }
.card:nth-child(5n+5) .card-bar { background: var(--ochre); }
.card .card-body { padding: 1.4rem 1.5rem 1.3rem; flex: 1; display: flex; flex-direction: column; }
.card .card-name {
  font-family: var(--serif-zh); font-size: 1.35rem;
  font-weight: 700; color: var(--ink); line-height: 1.2;
}
.card .card-en {
  font-family: var(--serif-en); font-size: 0.85rem; color: rgba(var(--ink-rgb), 0.45);
  font-style: italic; margin-bottom: 0.5rem;
}
.card .card-line {
  font-size: 0.85rem; color: rgba(var(--ink-rgb), 0.6);
  line-height: 1.55; flex: 1;
}
.card .card-pills { margin-top: 0.8rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
.card .card-pills span {
  font-family: var(--mono);
  font-size: 0.64rem; padding: 0.2rem 0.55rem; border-radius: 10px;
  background: var(--paper-tint); color: rgba(var(--ink-rgb), 0.5);
  letter-spacing: 0.04em;
}
.card .card-arrow {
  text-align: right; font-family: var(--mono);
  font-size: 0.68rem; color: rgba(var(--ink-rgb), 0.35);
  margin-top: 0.7rem; letter-spacing: 0.06em;
  transition: color 0.2s;
}
.card:hover .card-arrow { color: var(--cinnabar); }

/* ═══════════════ FEATURE PANELS ═══════════════ */
.feat-panel {
  margin: 5rem 0; padding: 2.8rem 2.5rem;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(var(--ink-rgb), 0.06);
}
.feat-panel.pink  { background: var(--cinnabar-bg); }
.feat-panel.lemon { background: var(--azure-bg); }
.feat-panel.sage  { background: var(--malachite-bg); }
.feat-panel.lilac { background: var(--indigo-bg); }
.feat-panel.blush { background: var(--ochre-bg); }
.feat-panel h3 {
  font-family: var(--serif-zh); font-size: 1.8rem;
  font-weight: 600; color: var(--ink);
  margin-bottom: 0.6rem; letter-spacing: 0.01em;
}
.feat-panel .feat-deck {
  font-family: var(--serif-zh);
  font-size: 0.95rem; color: rgba(var(--ink-rgb), 0.55);
  max-width: 600px; line-height: 1.65;
}
.feat-panel .feat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-top: 1.8rem; }
.feat-panel .feat-card {
  background: #fff; padding: 1.2rem 1.4rem;
  border-radius: var(--radius-md);
  border: 1px solid rgba(var(--ink-rgb), 0.05);
  transition: border-color 0.2s;
}
.feat-panel .feat-card:hover { border-color: rgba(var(--ink-rgb), 0.15); }
.feat-card .feat-head { font-family: var(--serif-zh); font-size: 1.1rem; font-weight: 600; color: var(--ink); margin-bottom: 0.2rem; }
.feat-card .feat-sub { font-size: 0.82rem; color: rgba(var(--ink-rgb), 0.5); line-height: 1.5; }

/* ═══════════════ RECOMMENDATION MATRIX ═══════════════ */
.rec-section { margin-top: 5rem; }
.rec-head { text-align: center; margin-bottom: 2rem; }
.rec-head h2 { font-family: var(--serif-zh); font-size: 2rem; font-weight: 600; color: var(--ink); }
.rec-head p { font-family: var(--serif-zh); color: rgba(var(--ink-rgb), 0.5); margin-top: 0.2rem; }
.rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 0.6rem; }
.rec-card {
  display: flex; align-items: baseline; gap: 0.7rem;
  padding: 0.8rem 1.2rem; background: #fff;
  border-left: 2px solid rgba(var(--ink-rgb), 0.12);
  border-radius: var(--radius-sm);
  transition: border-left-color 0.25s;
  border: 1px solid rgba(var(--ink-rgb), 0.04);
  border-left: 2px solid rgba(var(--ink-rgb), 0.12);
}
.rec-card:nth-child(5n+1):hover { border-left-color: var(--cinnabar); }
.rec-card:nth-child(5n+2):hover { border-left-color: var(--azure); }
.rec-card:nth-child(5n+3):hover { border-left-color: var(--malachite); }
.rec-card:nth-child(5n+4):hover { border-left-color: var(--indigo); }
.rec-card:nth-child(5n+5):hover { border-left-color: var(--ochre); }
.rec-card .rec-need { font-weight: 500; font-size: 0.88rem; color: var(--ink); white-space: nowrap; flex-shrink: 0; }
.rec-card .rec-names { font-family: var(--serif-zh); font-size: 0.82rem; color: rgba(var(--ink-rgb), 0.45); }

/* ═══════════════ DETAIL VIEW ═══════════════ */
#detail-container { display: none; }
#detail-container.active { display: block; }
#directory.hidden { display: none; }

.detail-nav {
  display: flex; align-items: center; gap: 1rem;
  padding: 1.2rem 0; border-bottom: 1px solid rgba(var(--ink-rgb), 0.1);
  margin-bottom: 1.5rem; flex-wrap: wrap;
}
.back-btn {
  font-family: var(--mono); font-size: 0.72rem;
  padding: 0.4rem 1.1rem; border: 1px solid rgba(var(--ink-rgb), 0.25);
  background: transparent; color: var(--ink);
  cursor: pointer; border-radius: 20px;
  transition: all 0.2s; letter-spacing: 0.06em; flex-shrink: 0;
}
.back-btn:hover { background: var(--ink); color: var(--paper); }
.detail-nav .dn-breadcrumb {
  font-family: var(--mono); font-size: 0.7rem;
  color: rgba(var(--ink-rgb), 0.4); letter-spacing: 0.08em;
}

/* ── Reader Hero ── */
.detail-hero {
  max-width: var(--reader-width); margin: 0 auto;
  padding: 3rem 0 3rem;
  border-bottom: 1px solid rgba(var(--ink-rgb), 0.1);
  margin-bottom: 1rem;
}
.detail-hero .dh-name {
  font-family: var(--serif-zh);
  font-size: clamp(2.4rem, 5vw, 3.8rem);
  font-weight: 900; line-height: 1.05;
  color: var(--ink); letter-spacing: 0.01em;
  margin-bottom: 0.3rem;
}
.detail-hero .dh-en {
  font-family: var(--serif-en);
  font-size: 1.15rem; color: rgba(var(--ink-rgb), 0.4);
  font-style: italic; margin-bottom: 1rem;
}
.detail-hero .dh-oneliner {
  font-family: var(--serif-zh);
  font-size: 1.1rem; color: rgba(var(--ink-rgb), 0.65);
  line-height: 1.55; font-weight: 400;
  padding-bottom: 1rem; margin-bottom: 1rem;
  border-bottom: 1px solid rgba(var(--ink-rgb), 0.08);
}
.detail-hero .dh-identity {
  font-size: 1rem; line-height: 1.85;
  color: var(--ink);
  padding: 1.6rem 2rem;
  background: var(--paper-tint);
  border-left: 2px solid var(--cinnabar);
  border-radius: var(--radius-md);
}

/* ── Reader Body ── */
.detail-body { max-width: var(--reader-width); margin: 0 auto; padding: 2rem 0 5rem; }

.detail-body .d-section { margin-bottom: 3.5rem; }
.detail-body .d-section h3 {
  font-family: var(--serif-zh); font-size: 1.55rem;
  font-weight: 600; color: var(--ink);
  margin-bottom: 1.5rem; letter-spacing: 0.01em;
  padding-bottom: 0.4rem; border-bottom: 1px solid rgba(var(--ink-rgb), 0.08);
}

/* ── Mental Models ── */
.model-list { display: flex; flex-direction: column; gap: 0.8rem; }
.model-block {
  padding: 1.5rem 2rem;
  border-radius: var(--radius-md);
  border-left: 2px solid var(--cinnabar);
  background: var(--cinnabar-bg);
}
.model-block:nth-child(5n+1) { background: var(--cinnabar-bg); border-left-color: var(--cinnabar); }
.model-block:nth-child(5n+2) { background: var(--azure-bg); border-left-color: var(--azure); }
.model-block:nth-child(5n+3) { background: var(--malachite-bg); border-left-color: var(--malachite); }
.model-block:nth-child(5n+4) { background: var(--indigo-bg); border-left-color: var(--indigo); }
.model-block:nth-child(5n+5) { background: var(--ochre-bg); border-left-color: var(--ochre); }
.model-block .model-num {
  font-family: var(--mono); font-size: 0.7rem;
  color: rgba(var(--ink-rgb), 0.4); margin-bottom: 0.2rem;
  letter-spacing: 0.08em;
}
.model-block .model-name {
  font-family: var(--serif-zh); font-size: 1.2rem;
  font-weight: 700; color: var(--ink);
  margin-bottom: 0.4rem; line-height: 1.3;
}
.model-block .model-desc {
  font-family: var(--serif-zh);
  font-size: 0.92rem; color: rgba(var(--ink-rgb), 0.6);
  line-height: 1.65; margin-bottom: 0.3rem;
}
.model-block .model-body {
  font-size: 0.9rem; color: rgba(var(--ink-rgb), 0.75);
  line-height: 1.75; margin-top: 0.5rem;
  padding-top: 0.5rem;
  border-top: 1px dotted rgba(var(--ink-rgb), 0.1);
}

/* ── Quotes ── */
.quote-list { display: flex; flex-direction: column; gap: 1.5rem; }
.quote-item {
  padding: 1.6rem 2rem;
  background: #fff;
  font-family: var(--serif-zh); font-weight: 400;
  font-size: 1.15rem;
  color: var(--ink); line-height: 1.6;
  letter-spacing: 0.01em;
  border-left: 2px solid var(--cinnabar);
  border-radius: var(--radius-md);
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
.quote-item:nth-child(5n+2) { border-left-color: var(--azure); }
.quote-item:nth-child(5n+3) { border-left-color: var(--malachite); }
.quote-item:nth-child(5n+4) { border-left-color: var(--indigo); }
.quote-item:nth-child(5n+5) { border-left-color: var(--ochre); }

/* ── Heuristics ── */
.heuristic-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
.heuristic-list li {
  display: flex; align-items: baseline; gap: 0.7rem;
  padding: 0.5rem 1rem; font-size: 0.92rem; color: rgba(var(--ink-rgb), 0.65);
  border-radius: var(--radius-sm);
  transition: background 0.2s;
}
.heuristic-list li:hover { background: var(--paper-tint); }
.heuristic-list li .hnum {
  font-family: var(--mono); font-size: 0.7rem;
  color: rgba(var(--ink-rgb), 0.35); flex-shrink: 0; width: 1.4rem;
  text-align: right; letter-spacing: 0.04em;
}
.heuristic-list li:nth-child(5n+1):hover { background: var(--cinnabar-bg); }
.heuristic-list li:nth-child(5n+2):hover { background: var(--azure-bg); }
.heuristic-list li:nth-child(5n+3):hover { background: var(--malachite-bg); }
.heuristic-list li:nth-child(5n+4):hover { background: var(--indigo-bg); }
.heuristic-list li:nth-child(5n+5):hover { background: var(--ochre-bg); }

/* ── Timeline ── */
.timeline-strip { display: flex; flex-wrap: wrap; gap: 0.8rem; }
.timeline-strip .tl-item {
  flex: 1; min-width: 150px;
  padding: 1rem 1.2rem; background: #fff;
  text-align: center; border-radius: var(--radius-md);
  border: 1px solid rgba(var(--ink-rgb), 0.05);
}
.tl-item .tl-year {
  font-family: var(--serif-en); font-size: 1.2rem;
  font-weight: 600; color: var(--cinnabar);
  margin-bottom: 0.3rem; font-style: italic;
}
.tl-item .tl-event { font-size: 0.82rem; color: rgba(var(--ink-rgb), 0.6); line-height: 1.5; }

/* ── DNA ── */
.dna-panel {
  background: var(--paper-tint); padding: 2rem 2.2rem;
  font-size: 1rem; line-height: 1.8; color: var(--ink);
  border-left: 2px solid var(--cinnabar);
  border-radius: var(--radius-md);
}

/* ── Values ── */
.value-strip { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.value-strip .vtag {
  font-family: var(--mono);
  font-size: 0.72rem; padding: 0.35rem 0.9rem;
  background: var(--paper-tint); border-radius: 16px;
  color: var(--ink); font-weight: 400;
  letter-spacing: 0.04em;
}

/* ── Tensions ── */
.tension-list { list-style: none; display: flex; flex-direction: column; gap: 0.8rem; }
.tension-list li {
  padding: 1.1rem 1.5rem; font-size: 0.92rem;
  color: rgba(var(--ink-rgb), 0.65); line-height: 1.6;
  border-radius: var(--radius-md);
  display: flex; gap: 0.6rem; align-items: flex-start;
}
.tension-list li:nth-child(odd) { background: var(--cinnabar-bg); }
.tension-list li:nth-child(even) { background: var(--azure-bg); }
.tension-list li::before {
  content: '×'; color: var(--cinnabar);
  font-weight: 700; font-size: 1.1rem;
  flex-shrink: 0; line-height: 1.4;
}

/* ═══════════════ GITHUB SECTION ═══════════════ */
.github-section {
  margin-top: 5rem; padding: 3rem 2rem;
  text-align: center;
  border-top: 1px solid rgba(var(--ink-rgb), 0.1);
}
.github-section h3 {
  font-family: var(--serif-zh); font-size: 1.6rem;
  font-weight: 600; color: var(--ink);
  margin-bottom: 0.5rem;
}
.github-section p {
  font-family: var(--serif-zh); font-size: 0.9rem;
  color: rgba(var(--ink-rgb), 0.5);
  max-width: 500px; margin: 0 auto 1.5rem;
  line-height: 1.6;
}
.github-links {
  display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
  margin-bottom: 2rem;
}
.github-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: var(--mono); font-size: 0.72rem;
  letter-spacing: 0.06em;
  padding: 0.5rem 1.4rem;
  border: 1px solid rgba(var(--ink-rgb), 0.2);
  border-radius: 20px;
  color: var(--ink); text-decoration: none;
  cursor: pointer; transition: all 0.2s;
}
.github-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.github-btn svg { width: 1em; height: 1em; opacity: 0.6; }

.qr-section {
  margin-top: 2rem;
  padding: 2rem;
  display: inline-block;
}
.qr-section .qr-placeholder {
  width: 160px; height: 160px;
  margin: 0 auto 1rem;
  border: 1px dashed rgba(var(--ink-rgb), 0.2);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 0.65rem;
  color: rgba(var(--ink-rgb), 0.35);
  letter-spacing: 0.06em;
  background: #fff;
}
.qr-section p {
  font-family: var(--serif-zh); font-size: 0.85rem;
  color: rgba(var(--ink-rgb), 0.5);
}

/* ═══════════════ FOOTER ═══════════════ */
footer {
  text-align: center; padding: 3rem 2rem;
  color: rgba(var(--ink-rgb), 0.4);
  font-family: var(--mono); font-size: 0.65rem;
  border-top: 1px solid rgba(var(--ink-rgb), 0.08);
  margin-top: 1rem; letter-spacing: 0.06em;
}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media (max-width: 768px) {
  .hero { padding: 4rem 1.5rem 3rem; }
  .hero h1 { font-size: 2.5rem; }
  main { padding: 1rem 1rem 3rem; }
  .card-grid { grid-template-columns: 1fr; }
  .rec-grid { grid-template-columns: 1fr; }
  .detail-hero { padding: 2rem 0; }
  .detail-hero .dh-name { font-size: 2rem; }
  .detail-hero .dh-identity { padding: 1.2rem 1.2rem; }
  .detail-body { padding: 1rem 0 3rem; }
  .feat-panel { padding: 2rem 1.5rem; }
  .model-block { padding: 1.2rem 1.2rem; }
  .quote-item { padding: 1.2rem 1.3rem; font-size: 1rem; }
  .timeline-strip { flex-direction: column; }
}
</style>
</head>
<body>

<!-- ═══════════════ HERO ═══════════════ -->
<header class="hero">
  <div class="eyebrow">Huashu Nuwa · Perspective Catalog</div>
  <h1>33 位人物<br><em>思维顾问</em></h1>
  <p class="deck">女娲蒸馏产物。每个人物是独立可用的思维镜片——点击任意一张卡片，进入那个人物的操作系统。</p>
  <div class="rule"></div>
  <p class="count">基于公开信息蒸馏 · 调研截止 2026-04</p>
</header>

<!-- ═══════════════ CAT NAV ═══════════════ -->
<div class="cat-nav-wrap" id="catNavWrap">
  <div class="cat-nav" id="catNav">
    <button data-cat="all" class="active">全部</button>
    <button data-cat="科技/AI">科技/AI</button>
    <button data-cat="科学/物理">科学/物理</button>
    <button data-cat="商业/投资">商业/投资</button>
    <button data-cat="风险/概率">风险/概率</button>
    <button data-cat="营销/广告">营销/广告</button>
    <button data-cat="内容/写作">内容/写作</button>
    <button data-cat="影视/创作">影视/创作</button>
    <button data-cat="社会/人文">社会/人文</button>
  </div>
</div>

<main>
  <div id="directory"></div>
  <div id="detail-container"></div>
</main>

<!-- ═══════════════ GITHUB + QR SECTION ═══════════════ -->
<section class="github-section">
  <h3>开源下载</h3>
  <p>33 位人物的完整 SKILL.md 文件在 GitHub 开放下载。每个文件可直接放入 Claude Code 使用。</p>
  <div class="github-links">
    <a href="https://github.com/wampeeHuang/nuwa-perspective-catalog" class="github-btn" target="_blank">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      查看 GitHub 仓库
    </a>
  </div>
  <div class="qr-section">
    <div class="qr-placeholder">交流群二维码</div>
    <p>扫码加入交流群，提名你想蒸馏的人物</p>
  </div>
</section>

<footer>
  女娲蒸馏目录 · 人物数据来自 perspective-* SKILL.md
</footer>

<script>
var DATA_FILES = ['_data/group-a.json', '_data/group-b.json', '_data/group-c.json'];
var CATEGORIES = ['科技/AI','科学/物理','商业/投资','风险/概率','营销/广告','内容/写作','影视/创作','社会/人文'];
var REC_MATRIX = [
  ['做重大决策，怕自己骗自己','费曼、芒格、塔勒布'],
  ['评估 AI 产品/技术前景','卡帕西、吴恩达、张一鸣'],
  ['写文章/做内容，提升传播力','Paul Graham、奥格威、休格曼'],
  ['砍成本/优化流程','马斯克、芒格、乔布斯'],
  ['学一个新技术/新领域','费曼、Naval、卡帕西'],
  ['设计产品/用户体验','乔布斯、有余、卡帕西'],
  ['搞营销/增长/拉新','孙宇晨、MrBeast、霍普金斯'],
  ['职业迷茫，不知道做什么','Naval、花叔、张雪峰'],
  ['谈判/博弈/权力局面','特朗普、塔勒布、张一鸣'],
  ['写代码/架构设计','卡帕西、宝玉、Zara Zhang'],
  ['拍视频/影视创作','Tim 潘、MrBeast、诺兰'],
  ['教育/学习路径选择','费曼、张雪峰、吴恩达'],
  ['内容创作/公众号写作','Paul Graham、奥格威、花叔']
];

var PANEL_COLORS = ['pink','lemon','sage','lilac','blush'];
var allCharacters = [];

async function loadData() {
  try {
    var results = await Promise.all(DATA_FILES.map(function(f) { return fetch(f).then(function(r) { return r.json(); }); }));
    allCharacters = results.flatMap(function(d) { return d.characters; });
    renderDirectory();
    setupDetailSections();
  } catch(err) {
    document.getElementById('directory').innerHTML =
      '<p style="text-align:center;padding:4rem;color:rgba(var(--ink-rgb),0.45);font-family:var(--mono)">请通过本地服务器打开此页面<br><code style="font-size:0.85rem">python -m http.server 8090</code></p>';
  }
}

function renderDirectory(filterCat) {
  filterCat = filterCat || 'all';
  var dir = document.getElementById('directory');
  dir.innerHTML = '';
  var cats = filterCat === 'all' ? CATEGORIES : [filterCat];
  var colorIdx = 0;

  cats.forEach(function(cat) {
    var chars = allCharacters.filter(function(c) { return c.category === cat; });
    if (!chars.length) return;

    var section = document.createElement('div');
    section.className = 'cat-section';
    section.setAttribute('data-category', cat);
    section.innerHTML = '<div class="cat-head"><h2>' + cat + '</h2><span class="cat-count">' + chars.length + ' 位</span></div>';

    var grid = document.createElement('div');
    grid.className = 'card-grid';
    chars.forEach(function(ch) {
      var card = document.createElement('div');
      card.className = 'card';
      card.onclick = function() { showDetail(ch.id); };
      var tags = (ch.mental_models || []).slice(0, 3).map(function(m) { return '<span>' + m.name + '</span>'; }).join('');
      card.innerHTML = '<div class="card-bar"></div><div class="card-body"><div class="card-name">' + ch.name_cn + '</div><div class="card-en">' + ch.name_en + (ch.nickname ? ' &middot; ' + ch.nickname : '') + '</div><div class="card-line">' + ch.oneliner + '</div><div class="card-pills">' + tags + '</div><div class="card-arrow">浏览人物 →</div></div>';
      grid.appendChild(card);
    });
    section.appendChild(grid);
    dir.appendChild(section);

    if (filterCat === 'all' && colorIdx < PANEL_COLORS.length) {
      var panel = makeFeaturePanel(cat, chars, PANEL_COLORS[colorIdx]);
      dir.appendChild(panel);
      colorIdx++;
    }
  });

  if (filterCat === 'all') renderRecMatrix(dir);
  if (!dir.children.length) {
    dir.innerHTML = '<p style="text-align:center;padding:4rem;color:rgba(var(--ink-rgb),0.45);font-family:var(--mono)">该分类暂无人物</p>';
  }
}

function makeFeaturePanel(cat, chars, color) {
  var panel = document.createElement('div');
  panel.className = 'feat-panel ' + color;
  var top3 = chars.slice(0, 3).map(function(c) { return c.name_cn; }).join('、');
  panel.innerHTML = '<h3>' + cat + ' 精选</h3><div class="feat-deck">' + cat + ' 领域 ' + chars.length + ' 位人物。推荐切入点：' + top3 + '。</div><div class="feat-grid">' +
    chars.map(function(ch) {
      return '<div class="feat-card" onclick="showDetail(\'' + ch.id + '\')" style="cursor:pointer"><div class="feat-head">' + ch.name_cn + '</div><div class="feat-sub">' + ch.oneliner + '</div></div>';
    }).join('') + '</div>';
  return panel;
}

function renderRecMatrix(parent) {
  var section = document.createElement('div');
  section.className = 'rec-section';
  section.innerHTML = '<div class="rec-head"><h2>按场景推荐</h2><p>不确定找谁时，从这里开始</p></div><div class="rec-grid">' +
    REC_MATRIX.map(function(r) {
      return '<div class="rec-card"><span class="rec-need">' + r[0] + '</span><span class="rec-names">&rarr; ' + r[1] + '</span></div>';
    }).join('') + '</div>';
  parent.appendChild(section);
}

function setupDetailSections() {
  var container = document.getElementById('detail-container');
  allCharacters.forEach(function(ch) {
    container.insertAdjacentHTML('beforeend', renderDetail(ch));
  });
}

function renderDetail(ch) {
  var h = '<div class="detail-pane" id="detail-' + ch.id + '" style="display:none">';
  h += '<div class="detail-nav"><button class="back-btn" onclick="hideDetail()">← 返回目录</button><span class="dn-breadcrumb">' + ch.category + '</span></div>';
  h += '<div class="detail-hero">';
  h += '<h2 class="dh-name">' + ch.name_cn + '</h2>';
  h += '<div class="dh-en">' + ch.name_en + (ch.nickname ? ' &middot; ' + ch.nickname : '') + '</div>';
  h += '<div class="dh-oneliner">' + ch.oneliner + '</div>';
  h += '<div class="dh-identity">' + (ch.identity || '') + '</div>';
  h += '</div>';
  h += '<div class="detail-body">';

  if (ch.mental_models && ch.mental_models.length) {
    h += '<div class="d-section"><h3>核心心智模型</h3><div class="model-list">';
    ch.mental_models.forEach(function(m, i) {
      h += '<div class="model-block"><div class="model-num">模型 ' + (i+1) + '</div><div class="model-name">' + m.name + '</div><div class="model-desc">' + (m.oneliner || '') + '</div>' + (m.body ? '<div class="model-body">' + m.body + '</div>' : '') + '</div>';
    });
    h += '</div></div>';
  }

  if (ch.quotes && ch.quotes.length) {
    h += '<div class="d-section"><h3>代表性语录</h3><div class="quote-list">';
    ch.quotes.forEach(function(q) { h += '<div class="quote-item">' + q + '</div>'; });
    h += '</div></div>';
  }

  if (ch.heuristics && ch.heuristics.length) {
    h += '<div class="d-section"><h3>决策启发式</h3><ol class="heuristic-list">';
    ch.heuristics.forEach(function(ht, i) { h += '<li><span class="hnum">' + (i+1) + '</span>' + ht + '</li>'; });
    h += '</ol></div>';
  }

  if (ch.timeline_highlights && ch.timeline_highlights.length) {
    h += '<div class="d-section"><h3>关键时间线</h3><div class="timeline-strip">';
    ch.timeline_highlights.forEach(function(t) {
      h += '<div class="tl-item"><div class="tl-year">' + t.year + '</div><div class="tl-event">' + t.event + '</div></div>';
    });
    h += '</div></div>';
  }

  if (ch.expression_dna) {
    h += '<div class="d-section"><h3>表达 DNA</h3><div class="dna-panel">' + ch.expression_dna + '</div></div>';
  }

  if (ch.values && ch.values.length) {
    h += '<div class="d-section"><h3>价值观</h3><div class="value-strip">';
    ch.values.forEach(function(v) { h += '<span class="vtag">' + v + '</span>'; });
    h += '</div></div>';
  }

  if (ch.tensions && ch.tensions.length) {
    h += '<div class="d-section"><h3>内在张力</h3><ul class="tension-list">';
    ch.tensions.forEach(function(t) { h += '<li>' + t + '</li>'; });
    h += '</ul></div>';
  }

  h += '</div></div>';
  return h;
}

function showDetail(id) {
  document.querySelectorAll('.detail-pane').forEach(function(p) { p.style.display = 'none'; });
  var pane = document.getElementById('detail-' + id);
  if (pane) pane.style.display = 'block';
  document.getElementById('directory').classList.add('hidden');
  document.getElementById('detail-container').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function hideDetail() {
  document.getElementById('directory').classList.remove('hidden');
  document.getElementById('detail-container').classList.remove('active');
  document.querySelectorAll('.detail-pane').forEach(function(p) { p.style.display = 'none'; });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('catNav').addEventListener('click', function(e) {
  if (e.target.tagName !== 'BUTTON') return;
  var cat = e.target.dataset.cat;
  document.querySelectorAll('#catNav button').forEach(function(b) { b.classList.remove('active'); });
  e.target.classList.add('active');
  hideDetail();
  renderDirectory(cat);
});

window.addEventListener('scroll', function() {
  var wrap = document.getElementById('catNavWrap');
  if (window.scrollY > 50) wrap.classList.add('scrolled');
  else wrap.classList.remove('scrolled');
});

loadData();
</script>
</body>
</html>
